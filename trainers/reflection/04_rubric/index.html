<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рубрика генераторы – SmartBoardAI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, Arial, sans-serif;
    background: radial-gradient(135deg, #f5f3ff, #ede9fe);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .wrapper { max-width: 960px; width: 100%; background: #fff; border-radius: 24px; padding: 28px 24px; box-shadow: 0 16px 40px rgba(15,23,42,0.1); }
  h1 { text-align: center; font-size: 24px; color: #6d28d9; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #7c3aed; font-size: 14px; margin-bottom: 22px; }

  .btn { border: none; border-radius: 999px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.18s; }
  .btn-purple { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
  .btn-purple:hover { transform: translateY(-1px); }
  .btn-ghost { background: #f3f4f6; color: #374151; margin-left: 6px; }

  /* SETUP */
  .setup-box { background: #faf5ff; border-radius: 16px; padding: 16px; border: 1px solid #e9d5ff; margin-bottom: 18px; }
  .setup-box label { font-size: 13px; font-weight: 700; color: #6d28d9; display: block; margin-bottom: 6px; }
  .setup-box input, .setup-box textarea {
    width: 100%; padding: 9px 12px; border-radius: 10px;
    border: 1px solid #d8b4fe; font-size: 13px; outline: none;
    background: white; margin-bottom: 10px;
  }
  .setup-box input:focus, .setup-box textarea:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
  .setup-box textarea { height: 80px; resize: vertical; }

  /* RUBRIC TABLE */
  .rubric-table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 16px; overflow: hidden; margin-top: 18px; border: 1px solid #e9d5ff; }
  .rubric-table th { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; padding: 12px 10px; font-size: 13px; text-align: center; }
  .rubric-table td { padding: 10px; border-top: 1px solid #f3e8ff; vertical-align: top; font-size: 13px; color: #374151; }
  .rubric-table tr:nth-child(even) td { background: #faf5ff; }

  .level-cell {
    text-align: center;
    cursor: pointer;
    border-radius: 10px;
    padding: 8px 6px;
    transition: all 0.15s;
    border: 2px solid transparent;
  }
  .level-cell:hover { background: #f3e8ff; border-color: #d8b4fe; }
  .level-cell.selected-4 { background: #dcfce7; border-color: #86efac; }
  .level-cell.selected-3 { background: #dbeafe; border-color: #93c5fd; }
  .level-cell.selected-2 { background: #fef9c3; border-color: #fde047; }
  .level-cell.selected-1 { background: #fee2e2; border-color: #fca5a5; }

  .level-badge { font-size: 18px; }
  .level-pts { font-size: 11px; color: #6b7280; margin-top: 2px; }

  /* RESULT */
  .result-section { margin-top: 20px; padding: 18px; background: linear-gradient(135deg, #f5f3ff, #ede9fe); border-radius: 18px; border: 1px solid #d8b4fe; }
  .result-title { font-weight: 700; font-size: 16px; color: #6d28d9; margin-bottom: 12px; }
  .result-score-big { font-size: 48px; font-weight: 900; color: #7c3aed; text-align: center; }
  .result-max { text-align: center; font-size: 14px; color: #8b5cf6; margin-top: 2px; }
  .result-grade { text-align: center; font-size: 20px; font-weight: 700; margin-top: 8px; }

  .breakdown { margin-top: 14px; }
  .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 10px; background: white; margin-bottom: 6px; font-size: 13px; border: 1px solid #f3e8ff; }
  .breakdown-pts { font-weight: 700; color: #7c3aed; }

  /* STUDENT LIST */
  .student-list { margin-top: 18px; }
  .student-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-radius: 10px; background: #faf5ff; border: 1px solid #e9d5ff; margin-bottom: 6px; font-size: 13px; animation: fade-in 0.2s ease; }
  .student-grade { font-weight: 700; padding: 3px 10px; border-radius: 999px; font-size: 12px; }
  .g-a { background: #dcfce7; color: #166534; }
  .g-b { background: #dbeafe; color: #1e40af; }
  .g-c { background: #fef9c3; color: #854d0e; }
  .g-d { background: #fee2e2; color: #991b1b; }

  @keyframes fade-in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .footer { margin-top: 24px; text-align: center; font-size: 13px; color: #7c3aed; padding-top: 14px; border-top: 3px solid #d8b4fe; }
</style>
</head>
<body>
<div class="wrapper">

  <h1>📋 Рубрика генераторы</h1>
  <div class="subtitle">Критерийлер бойынша баға — мұғалім мен оқушыға</div>

  <!-- SETUP -->
  <div class="setup-box">
    <label>Критерийлер (әр жолға бір):</label>
    <textarea id="criteriaInput">Мазмұны мен тереңдігі
Тілдік дұрыстық
Безендіру мен ұсыну
Уақытты сақтау
Командалық жұмыс</textarea>
    <label>Оқушының аты:</label>
    <input id="studentNameInput" type="text" placeholder="Мысалы: Айгерім Сейтқали">
    <button class="btn btn-purple" onclick="buildRubric()">📋 Рубрика жасау</button>
  </div>

  <!-- RUBRIC TABLE -->
  <div id="rubricArea"></div>

  <div id="actionRow" style="display:none; margin-top:14px;">
    <button class="btn btn-purple" onclick="calculateScore()">📊 Баға есептеу</button>
    <button class="btn btn-ghost" onclick="saveStudent()">💾 Оқушыны сақтау</button>
    <button class="btn btn-ghost" onclick="resetRubric()">🔄 Тазалау</button>
  </div>

  <!-- RESULT -->
  <div class="result-section" id="resultSection" style="display:none;">
    <div class="result-title">📊 Нәтиже</div>
    <div class="result-score-big" id="resultScore">0</div>
    <div class="result-max" id="resultMax"></div>
    <div class="result-grade" id="resultGrade"></div>
    <div class="breakdown" id="breakdown"></div>
  </div>

  <!-- STUDENT LIST -->
  <div class="student-list" id="studentList"></div>

  <div class="footer">
    🌿 <b>AI-Pedagogy Tools</b> by Nazerke Kairatkyzy 🌿
  </div>
</div>

<script>
  const LEVELS = [
    { pts: 4, label: "Үздік", emoji: "🌟" },
    { pts: 3, label: "Жақсы", emoji: "👍" },
    { pts: 2, label: "Жеткілікті", emoji: "🙂" },
    { pts: 1, label: "Дамуда", emoji: "📚" },
  ];

  let criteria = [];
  let selected = {};
  let students = [];

  function buildRubric() {
    const raw = document.getElementById("criteriaInput").value.trim();
    criteria = raw.split(/\r?\n/).map(x => x.trim()).filter(x => x);
    if (!criteria.length) { alert("Кемінде бір критерий жаз!"); return; }
    selected = {};

    let html = `<table class="rubric-table">
      <thead><tr>
        <th style="width:180px;">Критерий</th>
        ${LEVELS.map(l => `<th>${l.emoji} ${l.label}<br><small>${l.pts} ұпай</small></th>`).join("")}
      </tr></thead><tbody>`;

    criteria.forEach((c, ci) => {
      html += `<tr><td><b>${c}</b></td>`;
      LEVELS.forEach((l, li) => {
        html += `<td><div class="level-cell" id="cell-${ci}-${li}" onclick="selectLevel(${ci},${li})">
          <div class="level-badge">${l.emoji}</div>
          <div class="level-pts">${l.pts} ұпай</div>
        </div></td>`;
      });
      html += `</tr>`;
    });
    html += `</tbody></table>`;

    document.getElementById("rubricArea").innerHTML = html;
    document.getElementById("actionRow").style.display = "block";
    document.getElementById("resultSection").style.display = "none";
  }

  function selectLevel(ci, li) {
    // unselect previous
    if (selected[ci] !== undefined) {
      document.getElementById(`cell-${ci}-${selected[ci]}`).className = "level-cell";
    }
    selected[ci] = li;
    document.getElementById(`cell-${ci}-${li}`).className = `level-cell selected-${LEVELS[li].pts}`;
  }

  function calculateScore() {
    const total = criteria.length * 4;
    let earned = 0;
    const breakdown = [];

    criteria.forEach((c, i) => {
      const li = selected[i];
      if (li !== undefined) {
        const pts = LEVELS[li].pts;
        earned += pts;
        breakdown.push({ crit: c, pts, level: LEVELS[li].label });
      }
    });

    const pct = Math.round(earned / total * 100);
    const grade = pct >= 85 ? "A — Тамаша 🌟" : pct >= 70 ? "B — Жақсы 👍" : pct >= 55 ? "C — Орташа 🙂" : "D — Дамуда 📚";

    const rs = document.getElementById("resultSection");
    rs.style.display = "block";
    document.getElementById("resultScore").textContent = earned;
    document.getElementById("resultMax").textContent = `Максимум: ${total} ұпай  |  ${pct}%`;
    document.getElementById("resultGrade").textContent = grade;
    document.getElementById("breakdown").innerHTML = breakdown.map(b => `
      <div class="breakdown-row">
        <span>${b.crit}</span>
        <span style="color:#8b5cf6;">${b.level}</span>
        <span class="breakdown-pts">${b.pts}/4</span>
      </div>
    `).join("");
  }

  function saveStudent() {
    calculateScore();
    const name = document.getElementById("studentNameInput").value.trim() || "Оқушы";
    const total = criteria.length * 4;
    let earned = 0;
    criteria.forEach((_, i) => { if (selected[i] !== undefined) earned += LEVELS[selected[i]].pts; });
    const pct = Math.round(earned / total * 100);
    const grade = pct >= 85 ? "A" : pct >= 70 ? "B" : pct >= 55 ? "C" : "D";
    const gradeClass = { A:"g-a", B:"g-b", C:"g-c", D:"g-d" }[grade];
    students.unshift({ name, earned, total, pct, grade, gradeClass });
    renderStudents();
  }

  function renderStudents() {
    const box = document.getElementById("studentList");
    if (!students.length) { box.innerHTML = ""; return; }
    box.innerHTML = `<div style="font-weight:700;font-size:13px;color:#6d28d9;margin-bottom:8px;">📋 Бағаланған оқушылар</div>` +
      students.map(s => `<div class="student-row">
        <span>${s.name}</span>
        <span style="color:#6b7280;font-size:12px;">${s.earned}/${s.total} · ${s.pct}%</span>
        <span class="student-grade ${s.gradeClass}">${s.grade}</span>
      </div>`).join("");
  }

  function resetRubric() {
    selected = {};
    criteria.forEach((_, i) => {
      LEVELS.forEach((_, li) => {
        const el = document.getElementById(`cell-${i}-${li}`);
        if (el) el.className = "level-cell";
      });
    });
    document.getElementById("resultSection").style.display = "none";
  }
</script>
</body>
</html>
