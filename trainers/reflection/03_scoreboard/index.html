<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ұпай тақтасы – SmartBoardAI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, Arial, sans-serif;
    background: linear-gradient(135deg, #1e1b4b, #312e81, #1e1b4b);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
    color: white;
  }
  .wrapper {
    max-width: 960px;
    width: 100%;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(167,139,250,0.8);
  }
  .subtitle { text-align: center; color: #a5b4fc; font-size: 14px; margin-bottom: 24px; }

  /* SETUP PANEL */
  .setup-panel {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(167,139,250,0.3);
    margin-bottom: 20px;
  }
  .setup-title { font-size: 14px; font-weight: 700; color: #c4b5fd; margin-bottom: 10px; }
  .setup-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .setup-row input {
    flex: 1;
    min-width: 140px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgba(167,139,250,0.4);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 14px;
    outline: none;
  }
  .setup-row input::placeholder { color: #a5b4fc; }
  .setup-row input:focus { border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.2); }

  .btn {
    border: none;
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-violet { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; box-shadow: 0 4px 12px rgba(124,58,237,0.4); }
  .btn-violet:hover { transform: translateY(-1px); }
  .btn-ghost { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2); }

  /* SCOREBOARD */
  .board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .player-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 16px;
    text-align: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .player-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .player-card.rank-1 { background: linear-gradient(135deg, rgba(234,179,8,0.25), rgba(253,224,71,0.1)); border-color: #fbbf24; }
  .player-card.rank-2 { background: linear-gradient(135deg, rgba(148,163,184,0.2), rgba(100,116,139,0.1)); border-color: #94a3b8; }
  .player-card.rank-3 { background: linear-gradient(135deg, rgba(180,83,9,0.2), rgba(120,53,15,0.1)); border-color: #d97706; }

  .rank-badge {
    position: absolute;
    top: 8px;
    left: 10px;
    font-size: 18px;
  }
  .player-avatar {
    font-size: 36px;
    margin-bottom: 6px;
  }
  .player-name { font-size: 14px; font-weight: 700; color: #e2e8f0; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-score { font-size: 36px; font-weight: 900; color: #a78bfa; line-height: 1; margin-bottom: 10px; }
  .score-btns { display: flex; justify-content: center; gap: 6px; }
  .score-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .plus { background: #22c55e; color: white; }
  .plus:hover { transform: scale(1.15); }
  .minus { background: #ef4444; color: white; }
  .minus:hover { transform: scale(1.15); }
  .plus3 { background: #f59e0b; color: white; font-size: 12px; width: 36px; height: 36px; border-radius: 8px; }
  .del { background: rgba(255,255,255,0.1); color: #fca5a5; font-size: 12px; }
  .del:hover { background: rgba(239,68,68,0.3); }

  /* HISTORY BAR */
  .history-bar {
    display: flex;
    gap: 3px;
    justify-content: center;
    min-height: 12px;
    margin-top: 4px;
  }
  .hist-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .hist-plus  { background: #4ade80; }
  .hist-minus { background: #f87171; }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }

  /* TIMER */
  .timer-box {
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 14px 20px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 16px;
  }
  .timer-display { font-size: 40px; font-weight: 900; color: #fbbf24; letter-spacing: 2px; }

  .footer { margin-top: 24px; text-align: center; font-size: 13px; color: #a5b4fc; padding-top: 14px; border-top: 1px solid rgba(167,139,250,0.3); }
</style>
</head>
<body>
<div class="wrapper">

  <h1>🏆 Ұпай тақтасы</h1>
  <div class="subtitle">Нақты уақытта ұпай есебі — командалар мен оқушылар үшін</div>

  <!-- TIMER -->
  <div class="timer-box">
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div style="margin-top:8px; display:flex; gap:8px; justify-content:center;">
      <button class="btn btn-violet" onclick="startTimer()">▶ Старт</button>
      <button class="btn btn-ghost"  onclick="pauseTimer()">⏸ Пауза</button>
      <button class="btn btn-ghost"  onclick="resetTimer()">⏹ Нөл</button>
    </div>
  </div>

  <!-- SETUP -->
  <div class="setup-panel">
    <div class="setup-title">➕ Қатысушы / команда қосу</div>
    <div class="setup-row">
      <input id="newName" type="text" placeholder="Аты немесе команда атауы" onkeydown="if(event.key==='Enter')addPlayer()">
      <input id="newAvatar" type="text" placeholder="Emoji (🦁)" maxlength="4" style="max-width:90px;">
      <button class="btn btn-violet" onclick="addPlayer()">➕ Қосу</button>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn btn-ghost" onclick="resetAllScores()">🔄 Ұпайларды нөлге</button>
    <button class="btn btn-ghost" onclick="clearAll()">🗑 Барлығын тазалау</button>
    <button class="btn btn-ghost" onclick="sortByScore()">📊 Рейтинг бойынша</button>
  </div>

  <!-- BOARD -->
  <div class="board" id="board"></div>

  <div class="footer">
    🌿 <b>AI-Pedagogy Tools</b> by Nazerke Kairatkyzy 🌿
  </div>
</div>

<script>
  let players = [];
  let timerInterval = null;
  let timerSeconds = 0;
  let timerRunning = false;

  const AVATARS = ["🦁","🐯","🦊","🐺","🦅","🐬","🦋","🌟","🔥","⚡","🎯","🚀"];

  function addPlayer() {
    const name = document.getElementById("newName").value.trim();
    const avatar = document.getElementById("newAvatar").value.trim() || AVATARS[players.length % AVATARS.length];
    if (!name) { alert("Ат енгізіңіз!"); return; }
    players.push({ id: Date.now(), name, avatar, score: 0, log: [] });
    document.getElementById("newName").value = "";
    document.getElementById("newAvatar").value = "";
    render();
  }

  function changeScore(id, delta) {
    const p = players.find(p => p.id === id);
    if (!p) return;
    p.score = Math.max(0, p.score + delta);
    p.log.push(delta > 0 ? "plus" : "minus");
    if (p.log.length > 10) p.log.shift();
    render();
  }

  function removePlayer(id) {
    players = players.filter(p => p.id !== id);
    render();
  }

  function resetAllScores() {
    players.forEach(p => { p.score = 0; p.log = []; });
    render();
  }

  function clearAll() {
    if (players.length && !confirm("Барлық қатысушыларды жойайық па?")) return;
    players = [];
    render();
  }

  function sortByScore() {
    players.sort((a, b) => b.score - a.score);
    render();
  }

  function getRank(i) {
    const sorted = [...players].sort((a, b) => b.score - a.score);
    const rank = sorted.findIndex(p => p.id === players[i].id) + 1;
    return rank;
  }

  function render() {
    const board = document.getElementById("board");
    if (!players.length) {
      board.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#a5b4fc;padding:30px;">Жоғарыдан қатысушы қосыңыз</div>`;
      return;
    }
    board.innerHTML = players.map((p, i) => {
      const rank = getRank(i);
      const rankClass = rank === 1 ? "rank-1" : rank === 2 ? "rank-2" : rank === 3 ? "rank-3" : "";
      const rankEmoji = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : `#${rank}`;
      return `
        <div class="player-card ${rankClass}">
          <div class="rank-badge">${rankEmoji}</div>
          <div class="player-avatar">${p.avatar}</div>
          <div class="player-name">${p.name}</div>
          <div class="player-score">${p.score}</div>
          <div class="score-btns">
            <button class="score-btn minus" onclick="changeScore(${p.id}, -1)">−</button>
            <button class="score-btn plus" onclick="changeScore(${p.id}, +1)">+1</button>
            <button class="score-btn plus3" onclick="changeScore(${p.id}, +3)">+3</button>
            <button class="score-btn del" onclick="removePlayer(${p.id})">✕</button>
          </div>
          <div class="history-bar">
            ${p.log.map(l => `<div class="hist-dot hist-${l}"></div>`).join("")}
          </div>
        </div>
      `;
    }).join("");
  }

  // TIMER
  function startTimer() {
    if (timerRunning) return;
    timerRunning = true;
    timerInterval = setInterval(() => {
      timerSeconds++;
      const m = String(Math.floor(timerSeconds / 60)).padStart(2, "0");
      const s = String(timerSeconds % 60).padStart(2, "0");
      document.getElementById("timerDisplay").textContent = `${m}:${s}`;
    }, 1000);
  }
  function pauseTimer() {
    timerRunning = false;
    clearInterval(timerInterval);
  }
  function resetTimer() {
    pauseTimer();
    timerSeconds = 0;
    document.getElementById("timerDisplay").textContent = "00:00";
  }

  render();
</script>
</body>
</html>
