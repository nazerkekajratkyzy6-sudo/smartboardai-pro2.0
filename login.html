<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8"/>
  <title>SmartBoardAI PRO – Кіру</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">

  <style>
    /* Login беріне арнайы стильдер — main.css-тен алынған token-дар */
    body {
      overflow: auto;
      background:
        radial-gradient(ellipse at 15% 10%, rgba(79,70,229,0.10), transparent 50%),
        radial-gradient(ellipse at 85% 90%, rgba(99,102,241,0.08), transparent 50%),
        var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      height: 56px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: var(--shadow-sm);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-icon {
      width: 32px; height: 32px;
      border-radius: var(--r-md);
      background: linear-gradient(135deg, var(--primary), #818cf8);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: white;
      box-shadow: 0 2px 8px rgba(79,70,229,0.3);
    }

    .brand-name {
      font-size: 14px; font-weight: 800; color: var(--text-1);
    }

    .brand-pro {
      font-size: 10px; font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #818cf8);
      color: white;
      padding: 2px 7px; border-radius: var(--r-full);
    }

    .topbar-link {
      font-size: 13px; font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      padding: 5px 12px;
      border-radius: var(--r-full);
      background: var(--primary-light);
      transition: var(--tr);
    }
    .topbar-link:hover { background: var(--primary-mid); }

    /* ─── MAIN CONTENT ─── */
    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
    }

    /* ─── CARD ─── */
    .login-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px 26px 24px;
      box-shadow: var(--shadow-lg);
    }

    .login-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border2);
    }

    .login-logo {
      width: 44px; height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), #818cf8);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; color: white;
      box-shadow: 0 4px 14px rgba(79,70,229,0.3);
      flex-shrink: 0;
    }

    .login-header-text h2 {
      font-size: 17px; font-weight: 800;
      color: var(--text-1); margin-bottom: 3px;
    }

    .login-header-text p {
      font-size: 12px; color: var(--text-3);
    }

    /* ─── ROLE SWITCHER ─── */
    .role-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 20px;
      background: var(--bg2);
      border-radius: var(--r-lg);
      padding: 4px;
    }

    .role-tab {
      padding: 8px;
      border-radius: var(--r-md);
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-3);
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .role-tab.active {
      background: var(--white);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    /* ─── FIELDS ─── */
    .field {
      margin-bottom: 14px;
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .field-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      font-size: 14px;
      color: var(--text-1);
      background: var(--bg2);
      transition: var(--tr);
      font-family: inherit;
    }

    .field-input:focus {
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.10);
      outline: none;
    }

    .field-input::placeholder { color: var(--text-4); }

    /* ─── BUTTONS ─── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .btn-login {
      padding: 11px;
      border: none;
      border-radius: var(--r-md);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: var(--tr);
      font-family: inherit;
    }

    .btn-login.primary {
      background: linear-gradient(135deg, var(--primary), #818cf8);
      color: white;
      box-shadow: 0 4px 12px rgba(79,70,229,0.28);
    }
    .btn-login.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(79,70,229,0.38);
    }

    .btn-login.outline {
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid var(--primary-mid);
    }
    .btn-login.outline:hover { background: var(--primary-mid); }

    /* ─── DIVIDER ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      font-size: 12px;
      color: var(--text-4);
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── GOOGLE ─── */
    .btn-google {
      width: 100%;
      padding: 11px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      background: var(--white);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--tr);
      font-family: inherit;
    }
    .btn-google:hover { background: var(--bg2); border-color: var(--primary-mid); }

    /* ─── MESSAGE ─── */
    .msg-box {
      display: none;
      padding: 10px 12px;
      border-radius: var(--r-md);
      font-size: 13px;
      font-weight: 500;
      margin-top: 12px;
    }
    .msg-box.error { background: var(--danger-light); color: var(--danger); border: 1px solid #fecaca; display: block; }
    .msg-box.ok    { background: var(--success-light); color: var(--success); border: 1px solid #6ee7b7; display: block; }

    /* ─── STUDENT SECTION ─── */
    .student-section { display: none; }
    .student-section.active { display: block; }
    .teacher-section { display: block; }
    .teacher-section.hidden { display: none; }

    .room-input-wrap {
      text-align: center;
      padding: 10px 0 4px;
    }

    .room-code-input {
      width: 100%;
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: var(--r-lg);
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.2em;
      color: var(--primary);
      background: var(--primary-light);
      transition: var(--tr);
      font-family: inherit;
    }
    .room-code-input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    }
    .room-code-input::placeholder {
      color: var(--primary-mid);
      letter-spacing: 0.1em;
      font-size: 20px;
    }

    .btn-join {
      width: 100%;
      margin-top: 12px;
      padding: 13px;
      border: none;
      border-radius: var(--r-md);
      background: linear-gradient(135deg, var(--success), #059669);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      font-family: inherit;
    }
    .btn-join:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16,185,129,0.35); }

    /* ─── FOOTER ─── */
    .login-footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--text-4);
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="index.html" class="topbar-brand">
    <div class="brand-icon">⚡</div>
    <span class="brand-name">SmartBoardAI</span>
    <span class="brand-pro">PRO</span>
  </a>
  <a href="index.html" class="topbar-link">← Басты бет</a>
</div>

<!-- MAIN -->
<div class="login-main">
  <div class="login-wrap">

    <div class="login-card">

      <!-- HEADER -->
      <div class="login-header">
        <div class="login-logo">⚡</div>
        <div class="login-header-text">
          <h2>SmartBoardAI PRO</h2>
          <p>Кіру немесе бөлмеге қосылу</p>
        </div>
      </div>

      <!-- ROLE TABS -->
      <div class="role-tabs">
        <button class="role-tab active" id="tabTeacher" onclick="switchRole('teacher')">
          🎓 Мұғалім
        </button>
        <button class="role-tab" id="tabStudent" onclick="switchRole('student')">
          👤 Оқушы
        </button>
      </div>

      <!-- TEACHER SECTION -->
      <div class="teacher-section" id="teacherSection">
        <div class="field">
          <label class="field-label">Email</label>
          <input id="email" class="field-input" type="email"
            placeholder="example@mail.com" autocomplete="email"/>
        </div>

        <div class="field">
          <label class="field-label">Құпия сөз</label>
          <input id="password" class="field-input" type="password"
            placeholder="••••••••" autocomplete="current-password"/>
        </div>

        <div class="btn-row">
          <button id="signInBtn" class="btn-login primary">🔑 Кіру</button>
          <button id="signUpBtn" class="btn-login outline">➕ Тіркелу</button>
        </div>

        <div class="divider">немесе</div>

        <button id="googleBtn" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google арқылы кіру
        </button>
      </div>

      <!-- STUDENT SECTION -->
      <div class="student-section" id="studentSection">
        <div class="room-input-wrap">
          <p style="font-size:13px;color:var(--text-3);margin-bottom:14px;">
            Мұғалім берген <b>PIN кодты</b> енгізіңіз
          </p>
          <input id="roomCodeInput" class="room-code-input"
            type="text" maxlength="8"
            placeholder="• • • •"
            oninput="this.value=this.value.toUpperCase()"/>
          <input id="studentNameInput" class="field-input"
            type="text" placeholder="Атыңызды жазыңыз"
            style="margin-top:10px;font-size:14px;"/>
          <button class="btn-join" onclick="joinRoom()">
            🚀 Бөлмеге қосылу
          </button>
        </div>
      </div>

      <!-- MESSAGE -->
      <div id="msgBox" class="msg-box"></div>

    </div>

    <!-- FOOTER -->
    <div class="login-footer">
      SmartBoardAI PRO · AI-Pedagogy Tools by <b style="color:var(--text-3);">Nazerke Kairatkyzy</b>
    </div>

  </div>
</div>

<script>
  // Role switcher
  function switchRole(role) {
    const isTeacher = role === 'teacher';
    document.getElementById('tabTeacher').classList.toggle('active', isTeacher);
    document.getElementById('tabStudent').classList.toggle('active', !isTeacher);
    document.getElementById('teacherSection').classList.toggle('hidden', !isTeacher);
    document.getElementById('studentSection').classList.toggle('active', !isTeacher);
    document.getElementById('msgBox').className = 'msg-box';
  }

  // Student join
  function joinRoom() {
    const code = document.getElementById('roomCodeInput').value.trim();
    const name = document.getElementById('studentNameInput').value.trim();
    if (!code) { showMsg('PIN кодты енгізіңіз!', 'error'); return; }
    if (!name) { showMsg('Атыңызды жазыңыз!', 'error'); return; }
    // student.html-ге PIN + аты жіберу
    window.location.href = `student.html?room=${encodeURIComponent(code)}&name=${encodeURIComponent(name)}`;
  }

  function showMsg(text, type) {
    const el = document.getElementById('msgBox');
    el.className = 'msg-box ' + type;
    el.textContent = text;
  }

  // Enter key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const tab = document.getElementById('tabTeacher').classList.contains('active');
      if (tab) document.getElementById('signInBtn').click();
      else joinRoom();
    }
  });
</script>

<script type="module">
  import {
    auth,
    googleProvider,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInWithPopup
  } from "./firebaseConfig.js";

  const allowedEmail = "naz-erke_k@mail.ru";

  function showMsg(text, type) {
    const el = document.getElementById('msgBox');
    el.className = 'msg-box ' + type;
    el.textContent = (type === 'error' ? '❌ ' : '✅ ') + text;
  }

  function checkAllowed(email) {
    if (email !== allowedEmail) {
      showMsg("Бұл тақтаға тек автордың поштасына рұқсат бар.", "error");
      return false;
    }
    return true;
  }

  document.getElementById('signInBtn').onclick = async () => {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    if (!email || !pass) { showMsg("Email мен құпия сөзді енгізіңіз.", "error"); return; }
    if (!checkAllowed(email)) return;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      showMsg("Сәтті кірдіңіз!", "ok");
      setTimeout(() => window.location.href = "teacher.html", 600);
    } catch (e) {
      showMsg("Кіру қатесі: " + (e.code || e.message), "error");
    }
  };

  document.getElementById('signUpBtn').onclick = async () => {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    if (!email || !pass) { showMsg("Email мен құпия сөзді енгізіңіз.", "error"); return; }
    if (!checkAllowed(email)) return;
    try {
      await createUserWithEmailAndPassword(auth, email, pass);
      showMsg("Аккаунт тіркелді!", "ok");
    } catch (e) {
      showMsg("Тіркелу қатесі: " + (e.code || e.message), "error");
    }
  };

  document.getElementById('googleBtn').onclick = async () => {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      if (!checkAllowed(result.user.email)) { await auth.signOut(); return; }
      window.location.href = "teacher.html";
    } catch (e) {
      showMsg("Google қатесі: " + (e.code || e.message), "error");
    }
  };
</script>

</body>
</html>
